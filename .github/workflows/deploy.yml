name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Cache-bust asset versions (app.js/style.css 내용 해시 주입)
        run: |
          APPVER=$(md5sum public/static/app.js | cut -c1-10)
          CSSVER=$(md5sum public/static/style.css | cut -c1-10)
          sed -i "s/__APPVER__/$APPVER/g; s/__CSSVER__/$CSSVER/g" src/index.tsx
          echo "cache-bust → app.js?v=$APPVER, style.css?v=$CSSVER"

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@latest pages deploy dist --project-name=frameplus-erp --branch=main --commit-dirty=true
