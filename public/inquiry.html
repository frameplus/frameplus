<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>프레임플러스 — 사무공간 인테리어 상담 신청</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:linear-gradient(135deg,#EEF2FF 0%,#F9FAFB 100%);min-height:100vh;color:#1F2937;line-height:1.5;padding:20px}
  .wrap{max-width:560px;margin:30px auto;background:#fff;border-radius:16px;box-shadow:0 10px 40px rgba(79,70,229,.08);overflow:hidden}
  .header{background:linear-gradient(135deg,#4F46E5,#818CF8);color:#fff;padding:32px 28px;text-align:center}
  .header h1{font-size:22px;font-weight:800;letter-spacing:-.02em;margin-bottom:8px}
  .header p{font-size:13px;opacity:.9}
  form{padding:28px}
  .row{margin-bottom:18px}
  .row.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px}
  label .req{color:#EF4444;margin-left:3px}
  input[type=text],input[type=tel],input[type=email],select,textarea{width:100%;padding:11px 13px;border:1px solid #D1D5DB;border-radius:8px;font-size:14px;font-family:inherit;background:#fff;transition:border-color .15s,box-shadow .15s}
  input:focus,select:focus,textarea:focus{outline:none;border-color:#4F46E5;box-shadow:0 0 0 3px rgba(79,70,229,.12)}
  textarea{resize:vertical;min-height:90px}
  .agree{background:#F9FAFB;border:1px solid #E5E7EB;border-radius:8px;padding:14px;margin-bottom:14px}
  .agree label{display:flex;align-items:flex-start;gap:8px;font-size:12.5px;font-weight:500;color:#4B5563;margin-bottom:0;cursor:pointer}
  .agree label + label{margin-top:10px}
  .agree input[type=checkbox]{margin-top:2px;flex-shrink:0;cursor:pointer;width:16px;height:16px;accent-color:#4F46E5}
  .agree details{margin-top:6px;margin-left:24px}
  .agree summary{font-size:11.5px;color:#6B7280;cursor:pointer}
  .agree .terms{font-size:11.5px;color:#6B7280;padding:8px 0;line-height:1.6}
  .submit{width:100%;padding:13px;background:#4F46E5;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:background .15s,transform .1s;margin-top:6px}
  .submit:hover{background:#4338CA}
  .submit:active{transform:scale(.98)}
  .submit:disabled{background:#9CA3AF;cursor:wait}
  .honey{position:absolute;left:-9999px;opacity:0;pointer-events:none}
  .msg{display:none;padding:16px;border-radius:8px;font-size:13.5px;margin-bottom:16px;font-weight:500}
  .msg.ok{background:#ECFDF5;color:#065F46;border:1px solid #A7F3D0;display:block}
  .msg.err{background:#FEF2F2;color:#991B1B;border:1px solid #FCA5A5;display:block}
  .footer{text-align:center;padding:16px;font-size:11.5px;color:#9CA3AF;background:#F9FAFB;border-top:1px solid #E5E7EB}
  @media (max-width:520px){
    .wrap{margin:0 auto;border-radius:12px}
    .header{padding:24px 20px}
    .header h1{font-size:18px}
    form{padding:22px 20px}
    .row.row2{grid-template-columns:1fr}
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>사무공간 인테리어 상담 신청</h1>
      <p>프레임플러스가 영업일 1일 이내 연락드립니다</p>
    </div>
    <form id="inquiryForm" autocomplete="on">
      <div id="msg" class="msg"></div>

      <div class="row">
        <label>담당자 성함<span class="req">*</span></label>
        <input type="text" name="name" required maxlength="80" placeholder="홍길동" />
      </div>

      <div class="row row2">
        <div>
          <label>연락처<span class="req">*</span></label>
          <input type="tel" name="phone" maxlength="40" placeholder="010-1234-5678" />
        </div>
        <div>
          <label>이메일</label>
          <input type="email" name="email" maxlength="120" placeholder="name@company.com" />
        </div>
      </div>

      <div class="row">
        <label>회사명</label>
        <input type="text" name="company" maxlength="120" placeholder="(주)회사명" />
      </div>

      <div class="row row2">
        <div>
          <label>면적</label>
          <input type="text" name="area_text" maxlength="40" placeholder="예: 30평 또는 100㎡" />
        </div>
        <div>
          <label>예상 예산</label>
          <select name="budget_range">
            <option value="">선택</option>
            <option value="5천만원 미만">5천만원 미만</option>
            <option value="5천만~1억">5천만~1억</option>
            <option value="1억~3억">1억~3억</option>
            <option value="3억~5억">3억~5억</option>
            <option value="5억 이상">5억 이상</option>
            <option value="미정">미정</option>
          </select>
        </div>
      </div>

      <div class="row">
        <label>희망 일정</label>
        <select name="timeline">
          <option value="">선택</option>
          <option value="1개월 이내">1개월 이내</option>
          <option value="1~3개월">1~3개월</option>
          <option value="3~6개월">3~6개월</option>
          <option value="6개월 이후">6개월 이후</option>
          <option value="미정">미정</option>
        </select>
      </div>

      <div class="row">
        <label>요구사항·문의 내용</label>
        <textarea name="requirements" maxlength="2000" placeholder="공간 용도, 인원, 특별 요청사항 등 자유롭게 작성"></textarea>
      </div>

      <div class="agree">
        <label>
          <input type="checkbox" name="privacy_agreed" required />
          <span><b>[필수]</b> 개인정보 수집·이용에 동의합니다
            <details><summary>자세히 보기</summary>
              <div class="terms">
                · 수집 항목: 성함, 연락처, 이메일, 회사명, 상담 요청 내용<br>
                · 수집·이용 목적: 상담 진행 및 견적 안내<br>
                · 보유·이용 기간: 상담 종료 후 3년<br>
                · 동의 거부 시 상담 진행이 불가합니다.
              </div>
            </details>
          </span>
        </label>
        <label>
          <input type="checkbox" name="marketing_agreed" />
          <span>[선택] 마케팅 정보 수신에 동의합니다 (포트폴리오·이벤트 안내)</span>
        </label>
      </div>

      <!-- Honeypot: hidden field, real users won't fill this -->
      <input type="text" name="_hp" class="honey" tabindex="-1" autocomplete="off" />

      <button type="submit" class="submit" id="submitBtn">상담 신청</button>
    </form>
    <div class="footer">
      © Frame Plus · 사무공간 인테리어 디자인·시공
    </div>
  </div>

<script>
  const form = document.getElementById('inquiryForm');
  const msg = document.getElementById('msg');
  const btn = document.getElementById('submitBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    msg.className = 'msg';
    btn.disabled = true;
    btn.textContent = '전송 중...';

    const fd = new FormData(form);
    const body = {
      name: fd.get('name'),
      phone: fd.get('phone'),
      email: fd.get('email'),
      company: fd.get('company'),
      area_text: fd.get('area_text'),
      budget_range: fd.get('budget_range'),
      timeline: fd.get('timeline'),
      requirements: fd.get('requirements'),
      privacy_agreed: !!fd.get('privacy_agreed'),
      marketing_agreed: !!fd.get('marketing_agreed'),
      _hp: fd.get('_hp')
    };

    if (!body.phone && !body.email) {
      msg.className = 'msg err';
      msg.textContent = '연락처 또는 이메일 중 하나 이상 입력해주세요.';
      btn.disabled = false;
      btn.textContent = '상담 신청';
      return;
    }

    try {
      const res = await fetch('/api/inquiry', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await res.json();
      if (!res.ok) {
        msg.className = 'msg err';
        msg.textContent = data.error || '전송 실패. 잠시 후 다시 시도해주세요.';
        btn.disabled = false;
        btn.textContent = '상담 신청';
        return;
      }
      msg.className = 'msg ok';
      const dates = (data.suggestedDates || []).join(', ');
      msg.innerHTML = '✓ ' + (data.message || '접수 완료')
        + (dates ? '<br><br><b>추천 미팅 후보일:</b> ' + dates : '');
      form.querySelectorAll('input, select, textarea, button').forEach(el => el.disabled = true);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } catch (err) {
      msg.className = 'msg err';
      msg.textContent = '네트워크 오류. 잠시 후 다시 시도해주세요.';
      btn.disabled = false;
      btn.textContent = '상담 신청';
    }
  });
</script>
</body>
</html>
